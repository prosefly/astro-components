name: Release

on:
  push:
    tags:
      - astro-components-v*
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish with --dry-run
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @prosefly/astro-components
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag version
        if: github.event_name == 'push'
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/astro-components/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#astro-components-v}"
          test "$PACKAGE_VERSION" = "$TAG_VERSION"

      - name: Check package
        run: pnpm check

      - name: Build package
        run: pnpm build

      - name: Dry run publish
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        working-directory: packages/astro-components
        run: npx npm@latest publish --access public --dry-run

      - name: Publish package
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        working-directory: packages/astro-components
        run: npx npm@latest publish --access public
